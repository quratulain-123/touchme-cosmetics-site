<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900">
  <defs>
    <linearGradient id="gBody" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7f7f7"/>
    </linearGradient>
    <linearGradient id="gGold" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ffeb6e"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background hearts -->
  <rect width="600" height="900" fill="#fff0f6"/>
  <g fill="#e91e63" opacity="0.18">
    <text x="70" y="120" font-size="40">♥</text>
    <text x="520" y="210" font-size="26">♥</text>
    <text x="110" y="760" font-size="30">♥</text>
    <text x="480" y="720" font-size="48">♥</text>
  </g>

  <!-- Talc can -->
  <g transform="translate(150,90)" filter="url(#shadow)">
    <!-- cap -->
    <rect x="105" y="0" rx="10" ry="10" width="140" height="36" fill="#f2f2f2" stroke="#e0e0e0" stroke-width="3"/>
    <!-- body -->
    <rect x="0" y="30" rx="26" ry="26" width="350" height="700" fill="url(#gBody)" stroke="#e91e63" stroke-width="10"/>
    <!-- label -->
    <rect x="18" y="58" rx="18" ry="18" width="314" height="646" fill="#ffffff" stroke="#e91e63" stroke-width="5"/>

    <!-- tiny hearts row -->
    <g fill="#e91e63" font-size="18">
      <text x="150" y="95">♥ ♥ ♥</text>
    </g>

    <!-- brand -->
    <text x="53" y="135" font-family="Poppins, Arial, sans-serif" font-weight="700" font-size="28" fill="#333">TOUCHME®</text>

    <!-- product title -->
    <text x="48" y="200" font-family="'Dancing Script', cursive" font-size="78" font-weight="700" fill="#e91e63">Romantic</text>

    <!-- product type -->
    <text x="86" y="238" font-family="Poppins, Arial, sans-serif" font-size="22" fill="#c59a00">Perfumed Talc</text>

    <!-- glitter heart illustration -->
    <g transform="translate(55,270)">
      <path d="M120 40 C120 -20 40 -10 40 60 C40 110 120 160 120 160 C120 160 200 110 200 60 C200 -10 120 -20 120 40 Z" fill="#d0004f"/>
      <g fill="#ffffff" opacity="0.35">
        <circle cx="120" cy="40" r="3"/>
        <circle cx="80" cy="80" r="2"/>
        <circle cx="155" cy="95" r="2.5"/>
        <circle cx="100" cy="120" r="2"/>
        <circle cx="135" cy="60" r="2.5"/>
        <circle cx="150" cy="130" r="2"/>
      </g>
    </g>

    <!-- slogan with gold underline -->
    <text x="68" y="560" font-family="'Dancing Script', cursive" font-size="36" font-weight="700" fill="#e91e63">Fragrance of Love</text>
    <rect x="150" y="570" width="120" height="6" rx="3" fill="url(#gGold)"/>

    <!-- company -->
    <text x="85" y="625" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="700" fill="#333">TOUCHME COSMETICS</text>
  </g>

  <!-- Shadow ellipse -->
  <ellipse cx="300" cy="830" rx="140" ry="18" fill="#000" opacity="0.1"/>

  <!-- Corner hearts -->
  <g fill="#e91e63" opacity="0.6">
    <text x="18" y="48" font-size="22">♥</text>
    <text x="570" y="60" font-size="18">♥</text>
  </g>
</svg>


